<div class="row">
    <div class="col-lg-8">
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Subtotal</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let item of cartService.getItems()">
                        <td>{{item.name}}</td>
                        <td>{{item.price}} OMR</td>
                        <td>
                            <button class="btn btn-sm btn-outline-secondary" (click)="updateQuantity(item.id, -1)">-</button>
                            <span class="mx-2">{{item.quantity}}</span>
                            <button class="btn btn-sm btn-outline-secondary" (click)="updateQuantity(item.id, 1)">+</button>
                        </td>
                        <td>{{item.price * item.quantity}} OMR</td>
                        <td>
                            <button class="btn btn-sm btn-danger" (click)="cartService.removeItem(item.id)">Remove</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="col-lg-4">
        <div class="card p-3">
            <h4>Order Summary</h4>
            <hr>
            <p>Subtotal: {{cartService.getTotal()}} OMR</p>
            <p>Delivery fee: 1.50 OMR</p>
            <p><strong>Total: {{cartService.getTotal() + 1.5}} OMR</strong></p>
            <button class="btn btn-primary">Apply Order</button>
        </div>
    </div>
</div>

<div *ngIf="cartService.getItems().length === 0" class="text-center py-5">
    <i class="fas fa-shopping-cart fa-3x mb-3"></i>
    <h3>Your cart is empty</h3>
    <a routerLink="/menu" class="btn btn-primary">Go to Menu</a>
</div>
